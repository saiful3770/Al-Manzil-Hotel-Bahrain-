<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance + Inventory Tracker</title>

<style>
:root {
    --primary:#1e2a3a;
    --secondary:#1abc9c;
    --danger:#e74c3c;
    --light:#f0f4f8;
    --border:#dce4ec;
}

*{ box-sizing:border-box; margin:0; padding:0; font-family:Segoe UI, sans-serif; }
body{ background:#eef2f5; padding:15px; }
.app-container{ max-width:1200px; margin:auto; background:#fff; border-radius:12px; overflow:hidden; }
header{ background:var(--primary); color:#fff; padding:15px; text-align:center; }
.top-actions{ display:flex; gap:10px; padding:10px 15px; flex-wrap:wrap; }
.top-actions button{ flex:1; padding:10px; border:none; border-radius:6px; color:#fff; cursor:pointer; font-weight:bold; min-width:100px; }
.excel-btn{ background:#2ecc71; }
.share-btn{ background:#3498db; }
.print-btn{ background:#9b59b6; }
.date-filter{ display:flex; gap:10px; padding:0 15px 10px 15px; align-items:center; flex-wrap:wrap; }
.date-filter label{ font-weight:bold; color:var(--primary); }
.date-filter input[type="date"]{ padding:8px; border:1px solid var(--border); border-radius:6px; }
.date-filter button{ background:var(--secondary); color:#fff; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; }
.dashboard{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:15px; }
.card{ background:#fff; padding:12px; border-radius:10px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.card h2{margin:0;}
.total{border-left:4px solid #3498db;}
.pending{border-left:4px solid #f39c12;}
.progress{border-left:4px solid #9b59b6;}
.done{border-left:4px solid #2ecc71;}
.main{ padding:15px; }
.form-card{ background:var(--light); padding:15px; border-radius:10px; margin-bottom:15px; }
.form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
input,select{ padding:10px; border:1px solid var(--border); border-radius:6px; }
.table-card{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; min-width:900px; }
th{ background:var(--primary); color:#fff; padding:10px; }
td{ padding:10px; border-bottom:1px solid #ddd; }
.balance{ background:#e8f0fe; font-weight:bold; text-align:center; }
.btn{ border:none; background:none; cursor:pointer; color:blue; }
.del{ color:red; }
</style>
</head>

<body>
<div class="app-container">
<header>🛠️ Maintenance Tracker + Dashboard</header>
<div class="top-actions">
    <button class="excel-btn" onclick="exportExcel()">📊 Excel</button>
    <button class="share-btn" onclick="shareExcel()">📤 Share</button>
    <button class="print-btn" onclick="printTable()">🖨️ Print</button>
</div>
<div class="date-filter">
    <label for="filterDate">📅 Filter by Date:</label>
    <input type="date" id="filterDate">
    <button onclick="applyFilter()">Show</button>
    <button onclick="clearFilter()" style="background:#e74c3c;">Clear</button>
</div>
<div class="dashboard">
    <div class="card total"><h2 id="totalCount">0</h2><span>Total</span></div>
    <div class="card pending"><h2 id="pendingCount">0</h2><span>Pending</span></div>
    <div class="card progress"><h2 id="progressCount">0</h2><span>In Progress</span></div>
    <div class="card done"><h2 id="doneCount">0</h2><span>Done</span></div>
</div>
<div class="main">
<div class="form-card">
<form id="form">
<div class="form-grid">
<input id="roomNo" placeholder="Room No" required>
<input id="task" placeholder="Task" required>
<select id="material"><option value="">— Select Material —</option></select>
<input type="number" id="total" placeholder="Total (auto)">
<input type="number" id="used" placeholder="Used">
<select id="status"><option>Pending</option><option>In Progress</option><option>Done</option></select>
<input type="date" id="due" placeholder="Due Date">
<input id="remarks" placeholder="Remarks">
</div>
<button style="margin-top:10px;width:100%;padding:12px;background:#1abc9c;color:#fff;border:none;border-radius:6px;">Save</button>
</form>
</div>
<div class="table-card">
<table>
<thead><tr><th>Room</th><th>Task</th><th>Material</th><th>Total</th><th>Used</th><th>Balance</th><th>Status</th><th>Due</th><th>Remarks</th><th>Action</th></tr></thead>
<tbody id="body"></tbody>
</table>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCgoSp9MlJfg6aIAfmoc02TF6bcSAzwYAM",
    authDomain: "maintenance-inv.firebaseapp.com",
    databaseURL: "https://maintenance-inv-default-rtdb.firebaseio.com",
    projectId: "maintenance-inv",
    storageBucket: "maintenance-inv.firebasestorage.app",
    messagingSenderId: "292298087058",
    appId: "1:292298087058:web:fbfbb736ba4648296da44b"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

window.db = {};
window.editingKey = null;
window.filterDate = null;

const body = document.getElementById("body");
const filterDateInput = document.getElementById("filterDate");

onValue(ref(database, 'db'), (snapshot) => {
    window.db = snapshot.exists() ? snapshot.val() : {};
    window.render();
});

window.applyFilter = function(){ window.filterDate = filterDateInput.value; window.render(); }
window.clearFilter = function(){ window.filterDate = null; filterDateInput.value = ""; window.render(); }

window.render = function(){
    body.innerHTML="";
    let today = new Date().toISOString().split('T')[0];
    let targetDate = window.filterDate || today;
    
    let filteredEntries = Object.keys(window.db).filter(key => window.db[key].due === targetDate);
    
    let totalC=0, p=0, pr=0, d=0;
    filteredEntries.forEach(k=>{
        let r=window.db[k];
        totalC++;
        if(r.status==="Pending") p++; else if(r.status==="In Progress") pr++; else if(r.status==="Done") d++;
        body.innerHTML+=`<tr><td>${r.room}</td><td>${r.task}</td><td>${r.material}</td><td>${r.total}</td><td>${r.used}</td><td class="balance">${r.balance}</td><td>${r.status}</td><td>${r.due}</td><td>${r.remarks}</td><td><button class="btn" onclick="edit('${k}')">Edit</button><button class="btn del" onclick="del('${k}')">Del</button></td></tr>`;
    });
    document.getElementById("totalCount").innerText=totalC;
    document.getElementById("pendingCount").innerText=p;
    document.getElementById("progressCount").innerText=pr;
    document.getElementById("doneCount").innerText=d;
}

window.exportExcel = function(){
    let today = new Date().toISOString().split('T')[0];
    let targetDate = window.filterDate || today;
    let data = Object.keys(window.db).filter(k => window.db[k].due === targetDate).map(k => window.db[k]);
    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Report");
    XLSX.writeFile(wb, "Report_"+targetDate+".xlsx");
}

window.printTable = function(){
    let today = new Date().toISOString().split('T')[0];
    let targetDate = window.filterDate || today;
    let w = window.open("");
    w.document.write("<h2>Report: "+targetDate+"</h2><table border='1' width='100%'><tr><th>Room</th><th>Task</th><th>Material</th><th>Status</th></tr>");
    Object.keys(window.db).filter(k => window.db[k].due === targetDate).forEach(k => {
        let r = window.db[k];
        w.document.write(`<tr><td>${r.room}</td><td>${r.task}</td><td>${r.material}</td><td>${r.status}</td></tr>`);
    });
    w.document.write("</table>");
    w.print();
}

window.edit = function(id){
    let r = window.db[id];
    window.editingKey = id;
    document.getElementById("roomNo").value = r.room;
    document.getElementById("task").value = r.task;
    document.getElementById("status").value = r.status;
    document.getElementById("due").value = r.due;
    document.getElementById("remarks").value = r.remarks;
}
window.del = function(id){ remove(ref(database, 'db/' + id)); }
document.getElementById("form").onsubmit = e => {
    e.preventDefault();
    let id = window.editingKey || Date.now().toString();
    set(ref(database, 'db/' + id), { room: document.getElementById("roomNo").value, task: document.getElementById("task").value, status: document.getElementById("status").value, due: document.getElementById("due").value || new Date().toISOString().split('T')[0], remarks: document.getElementById("remarks").value });
    window.editingKey = null;
    document.getElementById("form").reset();
};
</script>
</body>
</html>
