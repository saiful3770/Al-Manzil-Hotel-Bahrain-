<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance + Inventory Tracker</title>

<style>
:root { --primary:#1e2a3a; --secondary:#1abc9c; --danger:#e74c3c; --light:#f0f4f8; --border:#dce4ec; }
*{ box-sizing:border-box; margin:0; padding:0; font-family:Segoe UI, sans-serif; }
body{ background:#eef2f5; padding:15px; }
.app-container{ max-width:1200px; margin:auto; background:#fff; border-radius:12px; overflow:hidden; }
header{ background:var(--primary); color:#fff; padding:15px; text-align:center; }
.top-actions{ display:flex; gap:10px; padding:10px 15px; flex-wrap:wrap; }
.top-actions button{ flex:1; padding:10px; border:none; border-radius:6px; color:#fff; cursor:pointer; font-weight:bold; min-width:100px; }
.excel-btn{ background:#2ecc71; } .share-btn{ background:#3498db; } .print-btn{ background:#9b59b6; }
.date-filter{ display:flex; gap:10px; padding:0 15px 10px 15px; align-items:center; flex-wrap:wrap; }
.date-filter input[type="date"]{ padding:8px; border:1px solid var(--border); border-radius:6px; }
.date-filter button{ background:var(--secondary); color:#fff; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; }
.dashboard{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:15px; }
.card{ background:#fff; padding:12px; border-radius:10px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.card h2{margin:0;}
.main{ padding:15px; }
.form-card{ background:var(--light); padding:15px; border-radius:10px; margin-bottom:15px; }
.form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
input,select{ padding:10px; border:1px solid var(--border); border-radius:6px; }
.material-box{ display:flex; gap:8px; margin-top:5px; flex-wrap:wrap; }
.material-box button{ background:#1abc9c; color:#fff; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; }
.manage-materials{ margin-top:15px; padding:10px; background:#fff; border-radius:8px; border:1px solid var(--border); }
.material-item{ display:flex; justify-content:space-between; align-items:center; padding:6px 10px; border-bottom:1px solid #eee; }
.table-card{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; min-width:900px; }
th{ background:var(--primary); color:#fff; padding:10px; }
td{ padding:10px; border-bottom:1px solid #ddd; }
.balance{ background:#e8f0fe; font-weight:bold; text-align:center; }
.btn{ border:none; background:none; cursor:pointer; color:blue; }
.del{ color:red; }
</style>
</head>

<body>
<div class="app-container">
<header>🛠️ Maintenance Tracker + Dashboard</header>
<div class="top-actions">
    <button class="excel-btn" onclick="exportExcel()">📊 Excel</button>
    <button class="share-btn" onclick="shareExcel()">📤 Share</button>
    <button class="print-btn" onclick="printTable()">🖨️ Print</button>
</div>
<div class="date-filter">
    <input type="date" id="filterDate">
    <button onclick="applyFilter()">Show</button>
    <button onclick="clearFilter()" style="background:#e74c3c;">Clear</button>
</div>

<div class="dashboard">
    <div class="card"><h2><span id="totalCount">0</span></h2><span>Total</span></div>
    <div class="card"><h2><span id="pendingCount">0</span></h2><span>Pending</span></div>
    <div class="card"><h2><span id="progressCount">0</span></h2><span>In Progress</span></div>
    <div class="card"><h2><span id="doneCount">0</span></h2><span>Done</span></div>
</div>

<div class="main">
<div class="form-card">
<form id="form">
<div class="form-grid">
<input id="roomNo" placeholder="Room No">
<input id="task" placeholder="Task">
<div>
    <select id="material"><option value="">— Select Material —</option></select>
    <div class="material-box">
        <input id="newMaterial" placeholder="Add New Material">
        <input type="number" id="newTotal" placeholder="Total Qty">
        <button type="button" onclick="addMaterial()">Add</button>
    </div>
</div>
<input type="number" id="total" placeholder="Total">
<input type="number" id="used" placeholder="Used">
<select id="status"><option>Pending</option><option>In Progress</option><option>Done</option></select>
<input type="date" id="due">
<input id="remarks" placeholder="Remarks">
</div>
<button style="margin-top:10px;width:100%;padding:12px;background:#1abc9c;color:#fff;border:none;border-radius:6px;">Save</button>
</form>
</div>

<div class="manage-materials"><h4>📦 Manage Materials</h4><div id="materialListContainer"></div></div>

<div class="table-card">
<table>
<thead><tr><th>Room</th><th>Task</th><th>Material</th><th>Total</th><th>Used</th><th>Balance</th><th>Status</th><th>Due</th><th>Remarks</th><th>Action</th></tr></thead>
<tbody id="body"></tbody>
</table>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCgoSp9MlJfg6aIAfmoc02TF6bcSAzwYAM",
    authDomain: "maintenance-inv.firebaseapp.com",
    databaseURL: "https://maintenance-inv-default-rtdb.firebaseio.com",
    projectId: "maintenance-inv",
    storageBucket: "maintenance-inv.firebasestorage.app",
    messagingSenderId: "292298087058",
    appId: "1:292298087058:web:fbfbb736ba4648296da44b"
};
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

window.db = {}; window.filterDate = null; window.materials = [];
const body = document.getElementById("body");

// Data Fetching
onValue(ref(database, 'materials'), (s) => { window.materials = s.exists() ? s.val() : []; renderMaterials(); });
onValue(ref(database, 'db'), (s) => { window.db = s.exists() ? s.val() : {}; render(); });

// Rendering Function
window.render = function(){
    body.innerHTML="";
    let today = new Date().toISOString().split('T')[0];
    let targetDate = window.filterDate || today;
    
    let entries = Object.keys(window.db).filter(k => window.db[k].due === targetDate);
    let counts = {total:0, pending:0, progress:0, done:0};
    
    entries.forEach(k=>{
        let r = window.db[k];
        counts.total++;
        if(r.status=="Pending") counts.pending++;
        if(r.status=="In Progress") counts.progress++;
        if(r.status=="Done") counts.done++;
        
        body.innerHTML += `<tr><td>${r.room}</td><td>${r.task}</td><td>${r.material}</td><td>${r.total}</td><td>${r.used}</td><td class="balance">${r.balance}</td><td>${r.status}</td><td>${r.due}</td><td>${r.remarks}</td><td><button class="btn" onclick="edit('${k}')">Edit</button><button class="btn del" onclick="del('${k}')">Del</button></td></tr>`;
    });
    document.getElementById("totalCount").innerText = counts.total;
    document.getElementById("pendingCount").innerText = counts.pending;
    document.getElementById("progressCount").innerText = counts.progress;
    document.getElementById("doneCount").innerText = counts.done;
}

window.applyFilter = function(){ window.filterDate = document.getElementById("filterDate").value; render(); }
window.clearFilter = function(){ window.filterDate = null; document.getElementById("filterDate").value = ""; render(); }

// Print & Export (Filter Logic Applied)
window.printTable = function(){
    let targetDate = window.filterDate || new Date().toISOString().split('T')[0];
    let w = window.open("");
    w.document.write("<h2>Maintenance Report ("+targetDate+")</h2><table border='1' width='100%' cellpadding='5'><tr><th>Room</th><th>Task</th><th>Material</th><th>Total</th><th>Used</th><th>Balance</th><th>Status</th><th>Due</th><th>Remarks</th></tr>");
    Object.keys(window.db).filter(k => window.db[k].due === targetDate).forEach(k => {
        let r = window.db[k];
        w.document.write(`<tr><td>${r.room}</td><td>${r.task}</td><td>${r.material}</td><td>${r.total}</td><td>${r.used}</td><td>${r.balance}</td><td>${r.status}</td><td>${r.due}</td><td>${r.remarks}</td></tr>`);
    });
    w.document.write("</table>"); w.print();
}

window.exportExcel = function(){
    let targetDate = window.filterDate || new Date().toISOString().split('T')[0];
    let data = Object.keys(window.db).filter(k => window.db[k].due === targetDate).map(k => window.db[k]);
    let ws = XLSX.utils.json_to_sheet(data); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, "Report_"+targetDate+".xlsx");
}

// Global functions for UI
window.addMaterial = function(){
    let m = document.getElementById("newMaterial").value;
    if(m) { window.materials.push(m); set(ref(database, 'materials'), window.materials); }
}
window.renderMaterials = function(){
    let sel = document.getElementById("material");
    sel.innerHTML = '<option value="">— Select Material —</option>';
    window.materials.forEach(m => sel.innerHTML += `<option value="${m}">${m}</option>`);
}
window.edit = function(id){ /* আগের কোড */ }
window.del = function(id){ remove(ref(database, 'db/' + id)); }
document.getElementById("form").onsubmit = e => {
    e.preventDefault();
    let id = Date.now().toString();
    set(ref(database, 'db/' + id), { room: document.getElementById("roomNo").value, task: document.getElementById("task").value, material: document.getElementById("material").value, total: document.getElementById("total").value, used: document.getElementById("used").value, balance: (document.getElementById("total").value - document.getElementById("used").value), status: document.getElementById("status").value, due: document.getElementById("due").value, remarks: document.getElementById("remarks").value });
};
</script>
</body>
</html>
